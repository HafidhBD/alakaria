<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة عيد الفطر | العقارية</title>
    <link href="https://www.al-akaria.com/wp-content/uploads/2024/11/cropped-cropped-Icon-1-32x32.png" rel="icon" sizes="32x32" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #d4b9b9;
            --primary-light: #efdece;
            --secondary-color: #efdece;
            --accent-color: #e74c3c;
            --accent-dark: #c0392b;
            --text-color: #333;
            --light-color: #243049;
            --light-gray: #f5f5f5;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            
            --twitter-color: #1DA1F2;
            --whatsapp-color: #25D366;
            --facebook-color: #1877F2;
            --telegram-color: #0088cc;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        @font-face {
            font-family: 'Frutiger LT Arabic';
            src: url('TheSansArab-Light.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        
        body {
            font-family: 'Frutiger LT Arabic', Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-attachment: fixed;
            line-height: 1.6;
        }
        
        .container {
            background: #142238;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            max-width: 600px;
            width: 100%;
            position: relative;
            overflow: hidden;
            transform: translateY(0);
            transition: var(--transition);
        }
        
        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        .header-container {
            position: relative;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .language-switcher {
            position: fixed;
            top: 1rem;
            left: 10px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
            border: none;
            border-radius: 50px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }
        
        body[dir="ltr"] .language-switcher {
            left: auto;
            right: 10px;
        }
        
        .language-switcher:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }
        
        .logo {
            max-width: 190px;
            height: auto;
            margin: 3rem auto 0;
            display: block;
            transition: var(--transition);
        }
        
        .logo:hover {
            transform: scale(1.05);
        }
        
        h2 {
            font-size: 1.8rem;
            margin-bottom: 1.8rem;
            color: var(--primary-color);
            position: relative;
            padding-bottom: 0.8rem;
            font-weight: 700;
        }
        
        h2::after {
            content: "";
            position: absolute;
            bottom: 0;
            right: 50%;
            transform: translateX(50%);
            width: 130px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), #e8dbda);
            border-radius: 4px;
        }
        
        .input-group {
            margin-bottom: 1.5rem;
        }
        
        .input-container {
            position: relative;
            margin-bottom: 1.2rem;
            text-align: right;
        }
        
        body[dir="ltr"] .input-container {
            text-align: left;
        }
        
        .input-container label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--primary-color);
            font-size: 1rem;
        }
        
        input {
            padding: 1rem 1.2rem;
            font-size: 1rem;
            width: 100%;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Frutiger LT Arabic', Arial, sans-serif;
            background-color: var(--light-gray);
            transition: var(--transition);
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.05);
            text-align: inherit;
        }
        
        input:focus {
            border-color: var(--primary-color);
            outline: none;
            background-color: #efdece;
            box-shadow: 0 0 0 3px rgba(101, 44, 145, 0.2);
        }
        
        .button-container {
            margin-top: 1.5rem;
        }
        
        button {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #ecd9cc, #ecdacb);
            color: #242f48;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Frutiger LT Arabic', Arial, sans-serif;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-width: 200px;
            box-shadow: 0 4px 8px rgba(231, 76, 60, 0.3);
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(231, 76, 60, 0.4);
        }
        
        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin: 1.5rem 0;
            color: #d6c3bc;
            font-size: 1.1rem;
        }
        
        .spinner {
            width: 22px;
            height: 22px;
            border: 3px solid rgba(217, 83, 79, 0.2);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .result-container {
            display: none;
            animation: fadeIn 0.6s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .success-message {
            background-color: rgb(222 201 193 / 96%);
            color: #243049;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.7rem;
        }
        
        canvas {
            margin: 1.5rem auto;
            border-radius: 15px;
            max-width: 100%;
            display: none;
            border: 1px solid #eee;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        
        #downloadButton {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: #243049;
            border-radius: 10px;
            text-decoration: none;
            font-family: 'Frutiger LT Arabic', Arial, sans-serif;
            transition: var(--transition);
            font-weight: 500;
            box-shadow: 0 4px 8px rgba(101, 44, 145, 0.3);
            width: fit-content;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .social-share {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        
        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            transition: var(--transition);
            text-decoration: none;
        }
        
        .twitter { background-color: var(--twitter-color); }
        .whatsapp { background-color: var(--whatsapp-color); }
        .facebook { background-color: var(--facebook-color); }
        .telegram { background-color: var(--telegram-color); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-container">
            <img alt="شعار العقارية" class="logo" src="https://i.ibb.co/W4bXtc7s/Alakaria-logo-white.png" />
        </div>
        
        <h2 id="mainHeading">عيد فطر سعيد</h2>
        
        <div class="input-group">
            <div class="input-container">
                <label for="nameInputAr" id="nameLabel">الاسم</label>
                <input id="nameInputAr" placeholder="اكتب اسمك هنا..." type="text" />
            </div>
        </div>
        
        <div class="button-container">
            <button id="generateButton">
                <span id="generateButtonText">إنشاء التهنئة</span>
            </button>
        </div>
        
        <div class="loading" id="loadingText">
            <div class="spinner"></div>
            <span id="loadingTextSpan">جاري إنشاء التهنئة...</span>
        </div>
        
        <div class="result-container" id="resultContainer">
            <div class="success-message">
                <span>✓</span>
                <span id="successMessage">تم إنشاء تهنئتك بنجاح!</span>
            </div>
            
            <canvas id="greetingCanvas"></canvas>
            
            <div class="download-share-container" id="downloadShareContainer">
                <a download="تهنئة-عيد-العقارية.png" href="#" id="downloadButton">
                    <span>📥</span>
                    <span id="downloadButtonText">تحميل التهنئة</span>
                </a>
                
                <div class="social-share">
                    <a href="#" class="social-btn twitter" id="twitterShare"><i class="fab fa-twitter"></i></a>
                    <a href="#" class="social-btn whatsapp" id="whatsappShare"><i class="fab fa-whatsapp"></i></a>
                    <a href="#" class="social-btn facebook" id="facebookShare"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social-btn telegram" id="telegramShare"><i class="fab fa-telegram-plane"></i></a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const nameInputAr = document.getElementById('nameInputAr');
            const generateButton = document.getElementById('generateButton');
            const loadingText = document.getElementById('loadingText');
            const resultContainer = document.getElementById('resultContainer');
            const canvas = document.getElementById('greetingCanvas');
            const downloadButton = document.getElementById('downloadButton');
            const ctx = canvas.getContext('2d');
            
            const languageSwitcher = document.getElementById('languageSwitcher');
            const htmlElement = document.documentElement;
            
            const arabicTexts = {
                heading: "عيد فطر سعيد",
                nameLabel: "الاسم",
                placeholder: "اكتب اسمك هنا...",
                generateButton: "إنشاء التهنئة",
                loadingText: "جاري إنشاء التهنئة، الرجاء الانتظار...",
                successMessage: "تم إنشاء تهنئتك بنجاح!",
                downloadButton: "تحميل التهنئة",
                switchToEnglish: "English"
            };
            
            const englishTexts = {
                heading: "Happy Eid",
                nameLabel: "Name",
                placeholder: "Enter your name here...",
                generateButton: "Generate Greeting",
                loadingText: "Generating your greeting, please wait...",
                successMessage: "Created successfully!",
                downloadButton: "Download Greeting",
                switchToArabic: "العربية"
            };

            async function loadFont() {
                try {
                    const font = new FontFace('Frutiger LT Arabic', 'url(FrutigerLTArabic-Roman.ttf)');
                    await font.load();
                    document.fonts.add(font);
                    return true;
                } catch (e) { return false; }
            }
            
            function toggleLanguage() {
                const isArabic = htmlElement.getAttribute('dir') === 'rtl';
                if (isArabic) {
                    htmlElement.setAttribute('dir', 'ltr');
                    htmlElement.setAttribute('lang', 'en');
                    languageSwitcher.innerHTML = `<i class="fas fa-language"></i><span>${arabicTexts.switchToEnglish}</span>`;
                    updateTexts(englishTexts);
                } else {
                    htmlElement.setAttribute('dir', 'rtl');
                    htmlElement.setAttribute('lang', 'ar');
                    languageSwitcher.innerHTML = `<i class="fas fa-language"></i><span>${englishTexts.switchToArabic}</span>`;
                    updateTexts(arabicTexts);
                }
            }
            
            function updateTexts(texts) {
                document.getElementById('mainHeading').textContent = texts.heading;
                document.getElementById('nameLabel').textContent = texts.nameLabel;
                nameInputAr.placeholder = texts.placeholder;
                document.getElementById('generateButtonText').textContent = texts.generateButton;
                document.getElementById('loadingTextSpan').textContent = texts.loadingText;
                document.getElementById('successMessage').textContent = texts.successMessage;
                document.getElementById('downloadButtonText').textContent = texts.downloadButton;
            }
            
            async function generateCard() {
                const name = nameInputAr.value.trim();
                if (!name) {
                    alert(htmlElement.getAttribute('dir') === 'rtl' ? 'الرجاء إدخال الاسم' : 'Please enter your name');
                    return;
                }
                
                loadingText.style.display = "flex";
                resultContainer.style.display = "none";
                
                try {
                    await loadFont();
                    const img = new Image();
                    img.crossOrigin = "anonymous";
                    img.src = "https://i.ibb.co/YFysZ9Pd/Eid-Alfitr-E-greeting-Card-Final.jpg";
                    
                    await new Promise((res, rej) => {
                        img.onload = res;
                        img.onerror = rej;
                    });
                    
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    
                    ctx.font = "70px Bold'Frutiger LT Arabic', Arial";
                    ctx.fillStyle = "#FFFFFF";
                    ctx.textAlign = "center";
                    ctx.fillText(name, canvas.width / 2, 2440);
                    
                    canvas.style.display = "block";
                    downloadButton.href = canvas.toDataURL('image/png');
                    resultContainer.style.display = "block";
                    
                    setupShareLinks(name);
                } catch (error) {
                    console.error(error);
                } finally {
                    loadingText.style.display = "none";
                }
            }
            
            function setupShareLinks(name) {
                const shareText = `تهنئة من ${name} عبر العقارية! 🎉`;
                const shareUrl = window.location.href;
                document.getElementById('twitterShare').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}`;
                document.getElementById('whatsappShare').href = `https://wa.me/?text=${encodeURIComponent(shareText + ' ' + shareUrl)}`;
                document.getElementById('facebookShare').href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}`;
                document.getElementById('telegramShare').href = `https://t.me/share/url?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(shareText)}`;
            }
            
            generateButton.addEventListener('click', generateCard);
            languageSwitcher.addEventListener('click', toggleLanguage);
            nameInputAr.addEventListener('keypress', (e) => e.key === 'Enter' && generateCard());
        });
    </script>
</body>
</html>
